# Databricks launchpad widget option lists.
# Keep dropdown defaults and selectable values centralized for easy updates.

widget_options:
  boolean_values:
    - "True"
    - "False"

  environments:
    - dev
    - qa
    - prod

  metadata_file_name:
    - source_registry.csv
    - column_mapping.csv
    - dq_rules.csv
    - publish_rules.csv

  metadata_folder_name:
    - /metadata/dev
    - /metadata/qa
    - /metadata/prod
    - cbr_data_engineering_library/data_publisher/resources

  metadata_base_mount_point:
    - /Volumes/cbr_dev
    - /Volumes/cbr_qa
    - /Volumes/cbr_prod
    - abfss://aa-inbound@<storage-account>.dfs.core.windows.net

  paths_config_path:
    - config/path_configs/pia_data_paths.dev.json
    - config/path_configs/pia_data_paths.qa.json
    - config/path_configs/pia_data_paths.prod.json

  ikea_dropzone_mounts:
    - ${RAW_CONNECT_COUNTRYRISKDET_ROOT:abfss://raw@<storage-account>.dfs.core.windows.net/connect/cemccountryriskdet}
    - ${RAW_CONNECT_ITEMMATPLANTREP_ROOT:abfss://raw@<storage-account>.dfs.core.windows.net/connect/cemcitemmatplantrep}
    - ${RAW_CONNECT_MSSREPRECEIVER_ROOT:abfss://raw@<storage-account>.dfs.core.windows.net/connect/cemcmssrepreceiver}
    - ${RAW_CONNECT_MTRLFTSDETAIL_ROOT:abfss://raw@<storage-account>.dfs.core.windows.net/connect/cemcmtrlftsdetail}
    - ${RAW_PIA_COMMONDIMENSIONSPRD_ROOT:abfss://raw@<storage-account>.dfs.core.windows.net/pia/commondimensionsprd}
    - ${RAW_PIA_ITEMSUMMARYPUBLICPRD_ROOT:abfss://raw@<storage-account>.dfs.core.windows.net/pia/itemsummarypublicprd}
    - abfss://rngpub@adlsdnapdevbronze.dfs.core.windows.net/eng511/raw_data/connect/cemccountryriskdet/deltaload
    - abfss://rngpub@adlsdnapdevbronze.dfs.core.windows.net/eng511/raw_data/pia/commondimensions/item
    - abfss://rngpub@adlsdnapdevbronze.dfs.core.windows.net/eng511/raw_data/pia/commondimensions/valuebag
    - abfss://rngpub@adlsdnapdevbronze.dfs.core.windows.net/eng511/raw_data/pia/commondimensions/bas
    - abfss://rngpub@adlsdnapdevbronze.dfs.core.windows.net/eng511/metadata/sttm

  source_formats:
    - binaryFile
    - json
    - jsonl
    - json_jsonl_mixed
