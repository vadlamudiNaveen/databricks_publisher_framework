bundle:
  name: databricks-ingestion-framework

include:
  - resources/jobs.yml

sync:
  include:
    - notebooks/**
    - notebooks_ipynb/**
    - config/**
    - pipelines/**
    - sql/**
    - docs/**

variables:
  databricks_host:
    description: Databricks workspace host
    default: https://adb-1274191232328482.2.azuredatabricks.net

  run_as_service_principal:
    description: Optional service principal application ID used to run jobs (leave empty for current user)
    default: ""

  uc_catalog:
    description: Unity Catalog catalog used by framework tables
    default: eng511_development_bronze

  uc_bronze_schema:
    description: Bronze schema name
    default: bronze

  uc_silver_schema:
    description: Silver schema name
    default: silver

  uc_audit_schema:
    description: Audit schema name
    default: audit

  uc_control_schema:
    description: Control schema name
    default: control

  global_config_path:
    description: Workspace path to global_config.yaml after bundle sync
    default: ${workspace.file_path}/config/global_config.yaml

  config_dir_path:
    description: Workspace path to config directory after bundle sync
    default: ${workspace.file_path}/config

  seed_silver_execute:
    description: Set true to run the optional silver test-data seeding task
    default: "false"

  seed_silver_source_table:
    description: Source silver table name for seeding
    default: connect_countryriskdet

  seed_silver_target_table:
    description: Target silver test table name for seeded data
    default: connect_countryriskdet_test_seed

  seed_silver_row_limit:
    description: Number of rows to copy from source into the test seed table
    default: "100"

  seed_silver_mode:
    description: "Seeding mode: overwrite or append"
    default: overwrite

  spark_version:
    description: Runtime version for job clusters
    default: 14.3.x-scala2.12

  node_type_id:
    description: Worker node type for job clusters
    default: Standard_DS3_v2

  min_workers:
    description: Minimum workers for autoscaling jobs
    default: 1

  max_workers:
    description: Maximum workers for autoscaling jobs
    default: 2

  existing_cluster_id:
    description: Existing cluster ID for job execution (empty = create new job clusters)
    default: ""

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://adb-1274191232328482.2.azuredatabricks.net
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      uc_catalog: eng511_development_bronze
      uc_bronze_schema: bronze_dev
      uc_silver_schema: silver_dev
      uc_audit_schema: audit_dev
      uc_control_schema: control_dev
      existing_cluster_id: "0408-062709-xu0nb836"
      min_workers: 1
      max_workers: 2

  prod:
    mode: production
    workspace:
      host: https://adb-1274191232328482.2.azuredatabricks.net
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      uc_catalog: eng511_production_bronze
      uc_bronze_schema: bronze
      uc_silver_schema: silver
      uc_audit_schema: audit
      uc_control_schema: control
      min_workers: 2
      max_workers: 8
